services:
  postgres:
    image: postgres:18
    container_name: nodejs-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # 与 .env 里 DATABASE_URL 密码一致
      POSTGRES_DB: nodejs_study
    volumes:
      - pgdata:/var/lib/postgresql/ # Volume：容器删了数据还在
    ports:
      - "5433:5432" # 宿主机可连，方便 migrate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nodejs_study"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: nodejs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: nodejs-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/nodejs_study?schema=public
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: nodejs-worker
    command: npm run worker:email
    environment:
      REDIS_URL: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata: # 声明命名卷
